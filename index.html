<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>旅遊分帳</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ocean:#2A6B7C;--ocean2:#1E4F5C;--ocean3:#D4EBF0;
  --sand:#F5F0E8;--sand2:#EDE6D6;--sand3:#D9CEB8;
  --coral:#E8633A;--coral2:#F5C4B0;
  --ink:#1C1C1C;--ink2:#4A4A4A;--ink3:#8A8A8A;
}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--sand);color:var(--ink);min-height:100vh;}
.app{max-width:680px;margin:0 auto;padding-bottom:80px;}

/* HERO */
.hero{background:var(--ocean2);padding:1.25rem 1rem 1.5rem;}
.hero-row{display:flex;align-items:center;gap:10px;}
.hero-title{font-size:20px;color:#fff;font-weight:600;}
.hero-sub{font-size:12px;color:rgba(255,255,255,0.6);margin-top:2px;}
.sync-row{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
.trip-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:3px 10px;font-size:12px;color:rgba(255,255,255,0.9);}
.sync-info{display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,0.6);}
.dot{width:7px;height:7px;border-radius:50%;background:#f87171;display:inline-block;}
.dot.on{background:#4ade80;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--ocean2);display:flex;z-index:100;border-top:1px solid rgba(255,255,255,0.1);}
.bnav-btn{flex:1;background:none;border:none;color:rgba(255,255,255,0.4);font-family:-apple-system,sans-serif;font-size:10px;padding:10px 4px 14px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;border-top:2px solid transparent;}
.bnav-btn.on{color:#fff;border-top-color:var(--coral);}
.bnav-icon{font-size:20px;line-height:1;}

/* CONTENT */
.content{padding:1rem;}
.tab{display:none;}
.tab.on{display:block;}

/* CARD */
.card{background:#fff;border-radius:14px;padding:1rem;margin-bottom:10px;border:1px solid var(--sand3);}
.card-hd{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.cic{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.ctt{font-size:13px;font-weight:500;color:var(--ink2);}

label{font-size:12px;color:var(--ink3);display:block;margin-bottom:4px;}
input,select{width:100%;padding:11px 12px;border:1.5px solid var(--sand3);border-radius:10px;font-size:16px;font-family:-apple-system,sans-serif;background:var(--sand);color:var(--ink);-webkit-appearance:none;appearance:none;outline:none;}
input:focus,select:focus{border-color:var(--ocean);background:#fff;}
.fmb{margin-bottom:10px;}
.f3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px;margin-bottom:10px;}

.btn{display:block;width:100%;padding:13px;border-radius:12px;border:none;background:var(--ocean);color:#fff;font-size:16px;font-weight:600;font-family:-apple-system,sans-serif;cursor:pointer;margin-top:4px;}
.btn-sm{display:inline-block;width:auto;padding:10px 16px;font-size:14px;border-radius:10px;margin-top:0;}
.btn-danger{background:#dc2626;}
.btn-gray{background:var(--ink3);}
.btn-outline{background:transparent;border:1.5px solid var(--sand3);color:var(--ink2);}

/* 行程名稱編輯 */
.name-row{display:flex;align-items:center;gap:8px;}
.name-row input{flex:1;}
.edit-btn{background:none;border:none;cursor:pointer;font-size:18px;padding:4px;flex-shrink:0;opacity:0.5;}
.edit-btn:hover{opacity:1;}

/* MEMBERS */
.mem-list{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;min-height:10px;}
.mtag{display:inline-flex;align-items:center;gap:4px;padding:5px 10px 5px 9px;border-radius:20px;font-size:13px;font-weight:500;border:1.5px solid;}
.mdel{background:none;border:none;font-size:18px;line-height:1;padding:0 0 0 3px;cursor:pointer;color:inherit;opacity:0.5;}
.mdel:active{opacity:1;}
.divider{border:none;border-top:1px dashed var(--sand3);margin:12px 0;}

/* SPLIT */
.sp-row{display:flex;gap:8px;margin-bottom:8px;}
.sp-btn{flex:1;padding:9px 8px;border-radius:20px;border:1.5px solid var(--sand3);background:var(--sand);font-size:13px;color:var(--ink3);font-family:-apple-system,sans-serif;cursor:pointer;text-align:center;}
.sp-btn.on{background:var(--ocean3);color:var(--ocean2);border-color:var(--ocean);}
.sp-wrap{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px;}
.sp-chk{display:inline-block;padding:8px 12px;border-radius:20px;border:1.5px solid var(--sand3);font-size:13px;background:var(--sand);cursor:pointer;font-family:-apple-system,sans-serif;}
.sp-chk.on{background:var(--ocean3);color:var(--ocean2);border-color:var(--ocean);}

/* EXPENSE LIST */
.eitem{display:flex;gap:10px;padding:10px 0;border-bottom:1px dashed var(--sand3);}
.eitem:last-child{border-bottom:none;}
.eic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.einf{flex:1;min-width:0;}
.ett{font-size:14px;font-weight:500;}
.emt{font-size:11px;color:var(--ink3);margin-top:3px;line-height:1.5;}
.pchip{padding:1px 7px;border-radius:10px;font-size:11px;font-weight:500;}
.ert{text-align:right;flex-shrink:0;}
.eam{font-size:14px;font-weight:500;}
.etw{font-size:11px;color:var(--ink3);}
.ctag{font-size:10px;padding:1px 5px;border-radius:4px;background:var(--ocean3);color:var(--ocean2);font-weight:500;}
.dbtn{margin-top:4px;padding:5px 10px;border-radius:8px;border:1px solid var(--sand3);background:transparent;font-size:12px;color:var(--ink3);cursor:pointer;font-family:-apple-system,sans-serif;}

/* SUMMARY */
.s2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.scard{border-radius:14px;padding:14px 16px;}
.scard.bl{background:var(--ocean2);color:#fff;}
.scard.sa{background:var(--sand2);}
.slb{font-size:11px;opacity:0.7;}
.svl{font-size:21px;font-weight:600;margin-top:4px;}
.prow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px dashed var(--sand3);}
.prow:last-child{border-bottom:none;}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:500;flex-shrink:0;border:2px solid;}
.setl{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px dashed var(--sand3);flex-wrap:wrap;}
.setl:last-child{border-bottom:none;}
.samt{margin-left:auto;padding:3px 10px;border-radius:10px;font-size:13px;font-weight:500;background:var(--coral2);color:var(--coral);}
.empty{text-align:center;padding:1.5rem;color:var(--ink3);font-size:13px;}
.admin-hint{font-size:11px;color:var(--ink3);margin-top:6px;text-align:center;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:none;align-items:center;justify-content:center;}
.overlay.show{display:flex;}
.modal{background:#fff;border-radius:16px;padding:1.5rem;width:88%;max-width:340px;}
.modal-title{font-size:16px;font-weight:600;margin-bottom:8px;color:var(--ink);}
.modal-sub{font-size:13px;color:var(--ink3);margin-bottom:16px;line-height:1.5;}
.modal-input{width:100%;padding:11px 12px;border:1.5px solid var(--sand3);border-radius:10px;font-size:16px;font-family:-apple-system,sans-serif;background:var(--sand);color:var(--ink);outline:none;margin-bottom:10px;-webkit-appearance:none;}
.modal-row{display:flex;gap:8px;}
.modal-btn{flex:1;padding:11px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:-apple-system,sans-serif;}
.modal-btn.cancel{background:var(--sand2);color:var(--ink2);}
.modal-btn.confirm{background:var(--ocean);color:#fff;}
.modal-btn.danger{background:#dc2626;color:#fff;}

/* LANDING PAGE */
.landing{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;background:var(--sand);}
.landing-hero{background:var(--ocean2);border-radius:20px;padding:2rem 1.5rem;width:100%;max-width:400px;text-align:center;margin-bottom:1.5rem;}
.landing-icon{font-size:48px;margin-bottom:12px;}
.landing-title{font-size:24px;font-weight:600;color:#fff;font-family:-apple-system,sans-serif;}
.landing-sub{font-size:13px;color:rgba(255,255,255,0.65);margin-top:6px;}
.landing-card{background:#fff;border-radius:16px;padding:1.25rem;width:100%;max-width:400px;border:1px solid var(--sand3);margin-bottom:10px;}
.landing-card h2{font-size:14px;font-weight:600;color:var(--ink2);margin-bottom:12px;}
.trip-history{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
.trip-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--sand);border-radius:10px;cursor:pointer;border:1.5px solid transparent;}
.trip-item:active{border-color:var(--ocean);}
.trip-item-name{font-size:14px;font-weight:500;}
.trip-item-code{font-size:11px;color:var(--ink3);margin-top:2px;}
.trip-item-arrow{color:var(--ink3);font-size:16px;}

#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:9px 20px;border-radius:20px;font-size:13px;z-index:999;display:none;white-space:nowrap;}
</style>
</head>
<body>
<div id="toast"></div>

<!-- 確認刪除成員 -->
<div class="overlay" id="del-mem-overlay">
  <div class="modal">
    <div class="modal-title">刪除成員</div>
    <div class="modal-sub" id="del-mem-msg">確定要刪除這位旅伴？</div>
    <div class="modal-row">
      <button class="modal-btn cancel" onclick="closeDelMem()">取消</button>
      <button class="modal-btn danger" onclick="confirmDelMem()">確定刪除</button>
    </div>
  </div>
</div>

<!-- 確認刪除費用 -->
<div class="overlay" id="del-exp-overlay">
  <div class="modal">
    <div class="modal-title">刪除費用</div>
    <div class="modal-sub" id="del-exp-msg">確定要刪除這筆費用？</div>
    <div class="modal-row">
      <button class="modal-btn cancel" onclick="closeDelExp()">取消</button>
      <button class="modal-btn danger" onclick="confirmDelExp()">確定刪除</button>
    </div>
  </div>
</div>

<!-- 確認清除全部 -->
<div class="overlay" id="clear-overlay">
  <div class="modal">
    <div class="modal-title">清除所有記錄</div>
    <div class="modal-sub">所有成員與費用記錄都會刪除，此操作無法復原。</div>
    <div class="modal-row">
      <button class="modal-btn cancel" onclick="closeClear()">取消</button>
      <button class="modal-btn danger" onclick="doClear()">確定清除</button>
    </div>
  </div>
</div>

<!-- 密碼彈窗（清除用） -->
<div class="overlay" id="pw-overlay">
  <div class="modal">
    <div class="modal-title">請輸入管理員密碼</div>
    <input class="modal-input" type="password" id="pw-input" placeholder="密碼"/>
    <div class="modal-row">
      <button class="modal-btn cancel" onclick="closePw()">取消</button>
      <button class="modal-btn confirm" onclick="confirmPw()">確認</button>
    </div>
  </div>
</div>

<!-- 行程選擇頁 -->
<div id="landing-page">
  <div class="landing">
    <div class="landing-hero">
      <div class="landing-icon">🧳</div>
      <div class="landing-title">旅遊分帳</div>
      <div class="landing-sub">輸入行程代碼，與旅伴即時同步記帳</div>
    </div>
    <div class="landing-card">
      <h2>加入 / 建立行程</h2>
      <div class="fmb">
        <label>行程代碼（自訂英數字，例如 vietnam2025）</label>
        <input type="text" id="trip-code-input" placeholder="輸入行程代碼" autocapitalize="none"/>
      </div>
      <button class="btn" onclick="enterTrip()">進入行程 →</button>
    </div>
    <div class="landing-card" id="history-card" style="display:none;">
      <h2>最近使用的行程</h2>
      <div class="trip-history" id="trip-history"></div>
    </div>
  </div>
</div>

<!-- 主 App -->
<div id="main-app" style="display:none;">
  <div class="app">
    <div class="hero">
      <div class="hero-row">
        <span style="font-size:22px;">🧳</span>
        <div>
          <div class="hero-title">旅遊分帳</div>
          <div class="hero-sub" id="hero-sub">載入中...</div>
        </div>
      </div>
      <div class="sync-row">
        <div class="trip-badge">🗺️ <span id="tndis">—</span></div>
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="sync-info"><span class="dot" id="syncDot"></span><span id="syncLabel">連線中</span></div>
          <button onclick="leaveTrip()" style="background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:3px 10px;font-size:11px;color:rgba(255,255,255,0.9);cursor:pointer;font-family:-apple-system,sans-serif;">切換行程</button>
        </div>
      </div>
    </div>

    <div class="content">
      <!-- 成員 -->
      <div class="tab on" id="s0">
        <div class="card">
          <div class="card-hd"><div class="cic" style="background:#D4EBF0;">🗺️</div><div class="ctt">行程設定</div></div>
          <div class="fmb">
            <label>行程名稱</label>
            <div class="name-row">
              <input type="text" id="tname" placeholder="輸入行程名稱" readonly/>
              <button class="edit-btn" id="edit-name-btn" onclick="toggleEditName()" title="編輯">✏️</button>
            </div>
          </div>
          <button class="btn" id="save-name-btn" onclick="saveTripName()" style="display:none;">儲存名稱</button>
        </div>
        <div class="card">
          <div class="card-hd"><div class="cic" style="background:#D4EDD8;">👥</div><div class="ctt">旅伴名單</div></div>
          <div style="display:flex;gap:8px;align-items:flex-end;">
            <div style="flex:1;"><label>名字</label><input type="text" id="nmem" placeholder="輸入旅伴名字"/></div>
            <button class="btn btn-sm" onclick="addMember()">＋ 新增</button>
          </div>
          <div class="mem-list" id="mlist"><span style="font-size:12px;color:var(--ink3);">尚未新增旅伴</span></div>
        </div>

      </div>

      <!-- 費用 -->
      <div class="tab" id="s1">
        <div class="card">
          <div class="card-hd"><div class="cic" style="background:#F5C4B0;">✈️</div><div class="ctt">記錄花費</div></div>
          <div class="fmb"><label>費用說明</label><input type="text" id="edesc" placeholder="例：夜市晚餐"/></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;">
            <div><label>金額</label><input type="number" id="eamt" placeholder="0" min="0" inputmode="decimal"/></div>
            <div><label>幣別</label>
              <select id="ecur">
                <option value="TWD" data-r="1">TWD 台幣</option>
                <option value="JPY" data-r="0.21">JPY 日圓</option>
                <option value="USD" data-r="32">USD 美元</option>
                <option value="EUR" data-r="35">EUR 歐元</option>
                <option value="GBP" data-r="40">GBP 英鎊</option>
                <option value="CNY" data-r="4.4">CNY 人民幣</option>
                <option value="KRW" data-r="0.024">KRW 韓圜</option>
                <option value="VND" data-r="0.0013">VND 越盾</option>
                <option value="THB" data-r="0.9">THB 泰銖</option>
                <option value="SGD" data-r="24">SGD 星幣</option>
                <option value="HKD" data-r="4.1">HKD 港幣</option>
                <option value="AUD" data-r="20">AUD 澳幣</option>
                <option value="NZD" data-r="18">NZD 紐幣</option>
                <option value="PHP" data-r="0.55">PHP 披索</option>
                <option value="IDR" data-r="0.002">IDR 印尼盾</option>
                <option value="MYR" data-r="7.2">MYR 馬幣</option>
              </select>
            </div>
          </div>
          <div class="fmb"><label>類別</label>
            <select id="ecat">
              <option value="🍜">🍜 餐飲</option>
              <option value="🏨">🏨 住宿</option>
              <option value="🚆">🚆 交通</option>
              <option value="🎡">🎡 娛樂</option>
              <option value="🛍️">🛍️ 購物</option>
              <option value="💊">💊 其他</option>
            </select>
          </div>
          <div class="fmb"><label>付款人</label><select id="epayer"><option value="">請先新增旅伴</option></select></div>
          <div class="fmb">
            <label>分攤方式</label>
            <div class="sp-row">
              <button class="sp-btn on" id="speq" onclick="setSplit(0)">平均分攤</button>
              <button class="sp-btn" id="spcu" onclick="setSplit(1)">自選成員</button>
            </div>
            <div class="sp-wrap" id="spwrap"><span style="font-size:12px;color:var(--ink3);">所有旅伴平均分攤</span></div>
          </div>
          <button class="btn" onclick="addExpense()">＋ 新增費用</button>
        </div>
        <div class="card">
          <div class="card-hd"><div class="cic" style="background:#EDE6D6;">🧾</div><div class="ctt">費用清單</div></div>
          <div id="elist"><div class="empty">尚無費用記錄</div></div>
        </div>
      </div>

      <!-- 結算 -->
      <div class="tab" id="s2">
        <div class="s2">
          <div class="scard bl"><div class="slb">總花費 (TWD)</div><div class="svl" id="stot">$0</div></div>
          <div class="scard sa"><div class="slb">費用筆數</div><div class="svl" id="scnt">0</div></div>
        </div>
        <div class="card">
          <div class="card-hd"><div class="cic" style="background:#D4EDD8;">💰</div><div class="ctt">每人花費</div></div>
          <div id="psum"><div class="empty">尚無資料</div></div>
        </div>
        <div class="card">
          <div class="card-hd"><div class="cic" style="background:#F5C4B0;">🤝</div><div class="ctt">清帳明細</div></div>
          <div id="slist"><div class="empty">尚無資料</div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="bnav">
    <button class="bnav-btn on" id="nb0" onclick="goTab(0)"><span class="bnav-icon">🧑‍🤝‍🧑</span><span>成員</span></button>
    <button class="bnav-btn" id="nb1" onclick="goTab(1)"><span class="bnav-icon">💳</span><span>費用</span></button>
    <button class="bnav-btn" id="nb2" onclick="goTab(2)"><span class="bnav-icon">📊</span><span>結算</span></button>
  </div>
</div>

<script type="module">

  {bg:'#EDE6D6',bd:'#8A7A5A',tx:'#4A3A1A'},
  {bg:'#E8E0F0',bd:'#6A4A8A',tx:'#3A1A5A'}
];

var members=[],expenses=[],tripName='',splitMode=0,splitSel=[];
var writing=false;

var ROOT=null;

var pendingDelMemIdx=-1;
var pendingDelExpId=-1;
var editingName=false;

// ── TOAST ──────────────────────────────────────────
function toast(m){
  var e=document.getElementById('toast');
  e.textContent=m;e.style.display='block';
  setTimeout(function(){e.style.display='none';},2000);
}

// ── SYNC ───────────────────────────────────────────
function setSyncStatus(ok){
  var dot=document.getElementById('syncDot');
  var lbl=document.getElementById('syncLabel');
  if(dot)dot.className=ok?'dot on':'dot';
  if(lbl)lbl.textContent=ok?'已同步':'未連線';
}

// ── HISTORY ────────────────────────────────────────
function getHistory(){
  try{return JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]');}catch(e){return [];}
}
function saveHistory(code,name){
  var h=getHistory().filter(function(x){return x.code!==code;});
  h.unshift({code:code,name:name||code});
  if(h.length>5)h=h.slice(0,5);
  localStorage.setItem(HISTORY_KEY,JSON.stringify(h));
}
function renderHistory(){
  var h=getHistory();
  var card=document.getElementById('history-card');
  var el=document.getElementById('trip-history');
  if(!h.length){card.style.display='none';return;}
  card.style.display='block';
  el.innerHTML=h.map(function(x){
    return '<div class="trip-item" onclick="quickEnter(\''+x.code+'\',\''+x.name+'\')">'
      +'<div><div class="trip-item-name">'+x.name+'</div><div class="trip-item-code">代碼：'+x.code+'</div></div>'
      +'<div class="trip-item-arrow">›</div></div>';
  }).join('');
}

window.delHistory=function(code){
  var h=getHistory().filter(function(x){return x.code!==code;});
  localStorage.setItem(HISTORY_KEY,JSON.stringify(h));
  renderHistory();
};

window.quickEnter=function(code){
  document.getElementById('trip-code-input').value=code;
  enterTrip();
};

window.enterTrip=function(){
  var code=document.getElementById('trip-code-input').value.trim().toLowerCase().replace(/\s+/g,'');
  var name='';
  if(!code){toast('請輸入行程代碼');return;}
  currentTripCode=code;
  ROOT=ref(db,'trips/'+code);
  document.getElementById('landing-page').style.display='none';
  document.getElementById('main-app').style.display='block';
  document.getElementById('hero-sub').textContent='行程代碼：'+code;
  startListening(name);
};

window.leaveTrip=function(){
  if(dataUnsub)dataUnsub();
  if(connUnsub)connUnsub();
  members=[];expenses=[];tripName='';splitMode=0;splitSel=[];
  currentTripCode='';ROOT=null;
  document.getElementById('main-app').style.display='none';
  document.getElementById('landing-page').style.display='block';
  renderHistory();
  goTab(0);
};

function startListening(defaultName){
  var connRef=ref(db,'.info/connected');
  connUnsub=onValue(connRef,function(snap){setSyncStatus(snap.val()===true);});

  dataUnsub=onValue(ROOT,function(snap){
    if(writing)return;
    var d=snap.val();
    if(!d){
      // 新行程，若有傳入名稱就初始化
      if(defaultName){
        tripName=defaultName;
        set(ROOT,{members:[],expenses:[],tripName:tripName});
      }
      renderAll();
      setSyncStatus(true);
      return;
    }
    members=d.members||[];
    expenses=d.expenses||[];
    tripName=d.tripName||currentTripCode;
    renderAll();
    setSyncStatus(true);
    saveHistory(currentTripCode,tripName);
  },function(){setSyncStatus(false);});
}

function renderAll(){
  var tn=document.getElementById('tname');
  if(tn)tn.value=tripName;
  var tnd=document.getElementById('tndis');
  if(tnd)tnd.textContent=tripName||currentTripCode;
  rMem();rPayer();rSplit();rExp();rSum();
}

function persist(){
  writing=true;
  set(ROOT,{members:members,expenses:expenses,tripName:tripName})
    .then(function(){setSyncStatus(true);writing=false;saveHistory(currentTripCode,tripName);})
    .catch(function(){setSyncStatus(false);writing=false;});
}

// ── TABS ───────────────────────────────────────────
function goTab(i){
  for(var j=0;j<3;j++){
    var s=document.getElementById('s'+j);
    var n=document.getElementById('nb'+j);
    if(s)s.className=j===i?'tab on':'tab';
    if(n)n.className=j===i?'bnav-btn on':'bnav-btn';
  }
  if(i===2)rSum();
  window.scrollTo(0,0);
}
window.goTab=goTab;

// ── HELPERS ────────────────────────────────────────
function gc(name){return CL[Math.max(0,members.indexOf(name))%CL.length];}
function ini(n){return n.substring(0,2).toUpperCase();}

// ── 行程名稱編輯 ────────────────────────────────────
window.toggleEditName=function(){
  var input=document.getElementById('tname');
  var saveBtn=document.getElementById('save-name-btn');
  var editBtn=document.getElementById('edit-name-btn');
  if(!editingName){
    editingName=true;
    input.removeAttribute('readonly');
    input.style.background='#fff';
    input.style.borderColor='var(--ocean)';
    input.focus();
    saveBtn.style.display='block';
    editBtn.textContent='✕';
  } else {
    editingName=false;
    input.setAttribute('readonly','');
    input.style.background='';
    input.style.borderColor='';
    input.value=tripName;
    saveBtn.style.display='none';
    editBtn.textContent='✏️';
  }
};

window.saveTripName=function(){
  var v=document.getElementById('tname').value.trim();
  if(!v){toast('請輸入行程名稱');return;}
  tripName=v;
  document.getElementById('tndis').textContent=v;
  var input=document.getElementById('tname');
  input.setAttribute('readonly','');
  input.style.background='';
  input.style.borderColor='';
  document.getElementById('save-name-btn').style.display='none';
  document.getElementById('edit-name-btn').textContent='✏️';
  editingName=false;
  persist();toast('已儲存 ✓');
};

// ── 成員 ───────────────────────────────────────────
window.addMember=function(){
  var inp=document.getElementById('nmem'),name=inp.value.trim();
  if(!name){toast('請輸入名字');return;}
  for(var i=0;i<members.length;i++){if(members[i]===name){toast(name+' 已在名單');return;}}
  members.push(name);inp.value='';
  rMem();rPayer();rSplit();persist();toast('已新增 '+name+' ✓');
};

window.askDelMember=function(i){
  pendingDelMemIdx=i;
  document.getElementById('del-mem-msg').textContent='確定要刪除「'+members[i]+'」？';
  document.getElementById('del-mem-overlay').className='overlay show';
};
window.closeDelMem=function(){
  document.getElementById('del-mem-overlay').className='overlay';
  pendingDelMemIdx=-1;
};
window.confirmDelMem=function(){
  if(pendingDelMemIdx<0)return;
  var n=members[pendingDelMemIdx];
  members.splice(pendingDelMemIdx,1);
  expenses=expenses.map(function(e){
    return Object.assign({},e,{sw:(e.sw||[]).filter(function(x){return x!==n;})});
  });
  closeDelMem();
  rMem();rPayer();rSplit();rExp();persist();toast('已刪除 '+n);
};

function rMem(){
  var el=document.getElementById('mlist'),h='',i,m,c;
  if(!members.length){el.innerHTML='<span style="font-size:12px;color:var(--ink3);">尚未新增旅伴</span>';return;}
  for(i=0;i<members.length;i++){
    m=members[i];c=gc(m);
    h+='<div class="mtag" style="background:'+c.bg+';border-color:'+c.bd+';color:'+c.tx+';">'
      +m+'<button class="mdel" onclick="askDelMember('+i+')">×</button></div>';
  }
  el.innerHTML=h;
}
function rPayer(){
  var s=document.getElementById('epayer'),h='',i;
  if(!members.length){s.innerHTML='<option value="">請先新增旅伴</option>';return;}
  for(i=0;i<members.length;i++)h+='<option>'+members[i]+'</option>';
  s.innerHTML=h;
}

// ── 清除 ───────────────────────────────────────────
window.openPw=function(){
  document.getElementById('pw-input').value='';
  document.getElementById('pw-overlay').className='overlay show';
  setTimeout(function(){document.getElementById('pw-input').focus();},100);
};
window.closePw=function(){document.getElementById('pw-overlay').className='overlay';};
window.confirmPw=function(){
  if(document.getElementById('pw-input').value!==ADMIN_PW){toast('密碼錯誤');return;}
  closePw();
  openClear();
};
function openClear(){document.getElementById('clear-overlay').className='overlay show';}
window.closeClear=function(){document.getElementById('clear-overlay').className='overlay';};
window.doClear=function(){
  members=[];expenses=[];tripName=currentTripCode;
  remove(ROOT).then(function(){setSyncStatus(true);});
  document.getElementById('tname').value='';
  document.getElementById('tndis').textContent=currentTripCode;
  rMem();rPayer();rSplit();rExp();
  document.getElementById('stot').textContent='TWD 0';
  document.getElementById('scnt').textContent='0';
  document.getElementById('psum').innerHTML='<div class="empty">尚無資料</div>';
  document.getElementById('slist').innerHTML='<div class="empty">尚無資料</div>';
  closeClear();toast('已清除所有記錄 ✓');
};

// ── 分攤 ───────────────────────────────────────────
window.setSplit=function(m){
  splitMode=m;
  document.getElementById('speq').className='sp-btn'+(m===0?' on':'');
  document.getElementById('spcu').className='sp-btn'+(m===1?' on':'');
  rSplit();
};
function rSplit(){
  var el=document.getElementById('spwrap'),h='',i;
  if(splitMode===0){el.innerHTML='<span style="font-size:12px;color:var(--ink3);">所有旅伴平均分攤</span>';return;}
  if(!members.length){el.innerHTML='<span style="font-size:12px;color:var(--ink3);">請先新增旅伴</span>';return;}
  splitSel=members.slice();
  for(i=0;i<members.length;i++)
    h+='<button class="sp-chk on" id="sc'+i+'" onclick="togSplit('+i+')">'+members[i]+'</button>';
  el.innerHTML=h;
}
window.togSplit=function(i){
  var m=members[i],el=document.getElementById('sc'+i),p=splitSel.indexOf(m);
  if(p>=0){splitSel.splice(p,1);el.className='sp-chk';}
  else{splitSel.push(m);el.className='sp-chk on';}
};

// ── 費用 ───────────────────────────────────────────
function getRate(c){
  var opts=document.getElementById('ecur').options,i;
  for(i=0;i<opts.length;i++)if(opts[i].value===c)return parseFloat(opts[i].getAttribute('data-r'));
  return 1;
}
window.addExpense=function(){
  var desc=document.getElementById('edesc').value.trim();
  var amt=parseFloat(document.getElementById('eamt').value);
  var cur=document.getElementById('ecur').value;
  var cat=document.getElementById('ecat').value;
  var payer=document.getElementById('epayer').value;
  if(!desc||isNaN(amt)||amt<=0||!payer){toast('請填寫完整資訊');return;}
  var sw=splitMode===0?members.slice():splitSel.slice();
  if(!sw.length){toast('請選擇分攤成員');return;}
  expenses.push({id:Date.now(),desc:desc,amt:amt,cur:cur,cat:cat,payer:payer,sw:sw,twd:amt*getRate(cur)});
  document.getElementById('edesc').value='';
  document.getElementById('eamt').value='';
  rExp();persist();toast('已記錄 ✓');
};

window.askDelExp=function(id){
  pendingDelExpId=id;
  var e=expenses.find(function(x){return x.id===id;});
  document.getElementById('del-exp-msg').textContent='確定要刪除「'+(e?e.desc:'此費用')+'」？';
  document.getElementById('del-exp-overlay').className='overlay show';
};
window.closeDelExp=function(){
  document.getElementById('del-exp-overlay').className='overlay';
  pendingDelExpId=-1;
};
window.confirmDelExp=function(){
  if(pendingDelExpId<0)return;
  expenses=expenses.filter(function(e){return e.id!==pendingDelExpId;});
  closeDelExp();rExp();persist();
};

function rExp(){
  var el=document.getElementById('elist'),h='',i,e,c,sl,am;
  if(!expenses.length){el.innerHTML='<div class="empty">尚無費用記錄</div>';return;}
  for(i=expenses.length-1;i>=0;i--){
    e=expenses[i];c=gc(e.payer);
    sl=(e.sw||[]).length===members.length?'所有人':(e.sw||[]).join('、');
    am=(e.cur==='VND'||e.cur==='KRW')?Math.round(e.amt).toLocaleString():Number(e.amt).toLocaleString();
    h+='<div class="eitem"><div class="eic" style="background:'+c.bg+';">'+e.cat+'</div>'
      +'<div class="einf"><div class="ett">'+e.desc+'</div>'
      +'<div class="emt"><span class="pchip" style="background:'+c.bg+';color:'+c.tx+';">'+e.payer+'</span> 付 · '+sl+'</div></div>'
      +'<div class="ert"><div class="eam"><span class="ctag">'+e.cur+'</span> '+am+'</div>'
      +'<div class="etw">≈ TWD '+Math.round(e.twd).toLocaleString()+'</div>'
      +'<button class="dbtn" onclick="askDelExp('+e.id+')">刪除</button></div></div>';
  }
  el.innerHTML=h;rSum();
}

// ── 結算 ───────────────────────────────────────────
function rSum(){
  if(!members.length)return;
  var i,e,m,j;

  // 幣別列表
  var currencies=[];
  for(i=0;i<expenses.length;i++){
    if(currencies.indexOf(expenses[i].cur)<0)currencies.push(expenses[i].cur);
  }

  // 每人每幣別：已墊(paid) / 應付(owed)
  // paidByCur[m][cur], owedByCur[m][cur]
  var paidByCur={}, owedByCur={}, paidTwd={}, owedTwd={};
  for(i=0;i<members.length;i++){
    m=members[i];
    paidByCur[m]={};owedByCur[m]={};paidTwd[m]=0;owedTwd[m]=0;
    for(var ci=0;ci<currencies.length;ci++){
      paidByCur[m][currencies[ci]]=0;
      owedByCur[m][currencies[ci]]=0;
    }
  }
  for(i=0;i<expenses.length;i++){
    e=expenses[i];
    if(paidByCur[e.payer]){
      paidByCur[e.payer][e.cur]=(paidByCur[e.payer][e.cur]||0)+e.amt;
      paidTwd[e.payer]=(paidTwd[e.payer]||0)+e.twd;
    }
    if((e.sw||[]).length){
      var shAmt=e.amt/(e.sw||[]).length;
      var shTwd=e.twd/(e.sw||[]).length;
      for(j=0;j<(e.sw||[]).length;j++){
        m=e.sw[j];
        if(owedByCur[m]){
          owedByCur[m][e.cur]=(owedByCur[m][e.cur]||0)+shAmt;
          owedTwd[m]=(owedTwd[m]||0)+shTwd;
        }
      }
    }
  }

  var tot=0;
  for(i=0;i<expenses.length;i++)tot+=expenses[i].twd;
  document.getElementById('stot').textContent='TWD '+Math.round(tot).toLocaleString();
  document.getElementById('scnt').textContent=expenses.length;

  function fmtA(a,c){
    var big=['VND','KRW'];
    if(big.indexOf(c)>=0)return Math.round(a).toLocaleString();
    var r=Math.round(a*10)/10;
    return r===Math.round(r)?Math.round(r).toLocaleString():(r.toFixed(1).toLocaleString());
  }
  // 計算各幣別匯率（從 expenses 反推）
  var rateMap={};
  for(i=0;i<expenses.length;i++){
    if(!rateMap[expenses[i].cur]&&expenses[i].amt>0)
      rateMap[expenses[i].cur]=expenses[i].twd/expenses[i].amt;
  }
  function twdOf(amt,cur){return amt*(rateMap[cur]||1);}

  var ps=document.getElementById('psum'),h='';
  if(!expenses.length){ps.innerHTML='<div class="empty">尚無資料</div>';}
  else{
    for(i=0;i<members.length;i++){
      m=members[i];
      var c=gc(m);
      // 各幣別個人花費（應付金額），格式：總花費 台幣xxx 新幣xxx
      var curParts=[];
      // TWD 先
      if((owedByCur[m]['TWD']||0)>0){
        curParts.push('台幣 '+fmtA(owedByCur[m]['TWD'],'TWD'));
      }
      // 其他外幣
      for(var ci2=0;ci2<currencies.length;ci2++){
        var cur2=currencies[ci2];
        if(cur2==='TWD')continue;
        var o2=owedByCur[m][cur2]||0;
        if(o2<=0)continue;
        var curName={'JPY':'日幣','USD':'美金','EUR':'歐元','KRW':'韓幣','VND':'越幣','THB':'泰銖','SGD':'新幣','HKD':'港幣'}[cur2]||cur2;
        curParts.push(curName+' '+fmtA(o2,cur2));
      }
      // 右側顯示各幣別總花費，每幣別一行（同清帳明細 .samt 樣式）
      var costRight='';
      for(var cj=0;cj<curParts.length;cj++){
        costRight+='<div style="text-align:right;margin-bottom:4px;"><span class="samt" style="font-size:13px;">'+curParts[cj]+'</span></div>';
      }
      h+='<div style="padding:12px 0;border-bottom:1px dashed var(--sand3);">'
        +'<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">'
        +'<div style="display:flex;align-items:center;gap:8px;">'
        +'<div class="av" style="width:36px;height:36px;font-size:12px;background:'+c.bg+';border-color:'+c.bd+';color:'+c.tx+';">'+ini(m)+'</div>'
        +'<span style="font-size:15px;font-weight:600;">'+m+'</span></div>'
        +'<div>'+(costRight||'<span style="font-size:13px;color:var(--ink3);">無花費</span>')+'</div>'
        +'</div></div>';
    }
    ps.innerHTML=h;
  }

  // ── 清帳明細：每幣別分開計算 ──────────────────────────
  var sl2=document.getElementById('slist');
  if(!expenses.length){sl2.innerHTML='<div class="empty">尚無資料</div>';return;}

  // 對每個幣別獨立做最小轉帳計算
  var allSets={}; // allSets[cur] = [{f,t,a,cur}]
  for(var ci3=0;ci3<currencies.length;ci3++){
    var cur3=currencies[ci3];
    var balC={};
    for(i=0;i<members.length;i++)balC[members[i]]=0;
    for(i=0;i<expenses.length;i++){
      e=expenses[i];
      if(e.cur!==cur3)continue;
      balC[e.payer]=(balC[e.payer]||0)+e.amt;
      if((e.sw||[]).length){
        var sc=e.amt/(e.sw||[]).length;
        for(j=0;j<(e.sw||[]).length;j++)balC[e.sw[j]]=(balC[e.sw[j]]||0)-sc;
      }
    }
    var debC=[],creC=[];
    for(m in balC){
      var bv=Math.round(balC[m]*100)/100;
      if(bv<-0.01)debC.push([m,-bv]);
      else if(bv>0.01)creC.push([m,bv]);
    }
    debC.sort(function(a,b){return a[1]-b[1];});
    creC.sort(function(a,b){return b[1]-a[1];});
    var di2=0,ci4=0;
    allSets[cur3]=[];
    while(di2<debC.length&&ci4<creC.length){
      var pv=Math.round(Math.min(debC[di2][1],creC[ci4][1])*100)/100;
      if(pv>0.01)allSets[cur3].push({f:debC[di2][0],t:creC[ci4][0],a:pv,cur:cur3});
      debC[di2][1]-=pv;creC[ci4][1]-=pv;
      if(debC[di2][1]<=0.01)di2++;
      if(creC[ci4][1]<=0.01)ci4++;
    }
  }

  // 合併同 from→to 的不同幣別
  var setMap={};
  for(var ci5=0;ci5<currencies.length;ci5++){
    var cur5=currencies[ci5];
    var arr=allSets[cur5]||[];
    for(i=0;i<arr.length;i++){
      var key=arr[i].f+'→'+arr[i].t;
      if(!setMap[key])setMap[key]={f:arr[i].f,t:arr[i].t,items:[]};
      setMap[key].items.push({a:arr[i].a,cur:cur5});
    }
  }

  var h2='';
  var hasAny=false;
  for(var key in setMap){
    hasAny=true;
    var ss=setMap[key];
    var fc2=gc(ss.f),tc2=gc(ss.t);
    var amtLines=ss.items.map(function(it){
      var curName2={'JPY':'日幣','USD':'美金','EUR':'歐元','KRW':'韓幣','VND':'越幣','THB':'泰銖','SGD':'新幣','HKD':'港幣','TWD':'台幣'}[it.cur]||it.cur;
      return '<span class="samt" style="font-size:13px;">'+curName2+' '+fmtA(it.a,it.cur)+'</span>';
    }).join('');
    h2+='<div class="setl">'
      +'<div class="av" style="width:36px;height:36px;font-size:12px;background:'+fc2.bg+';border-color:'+fc2.bd+';color:'+fc2.tx+';">'+ini(ss.f)+'</div>'
      +'<span style="font-size:15px;font-weight:600;">'+ss.f+'</span>'
      +'<span style="color:var(--ink3);font-size:12px;">→ 還給</span>'
      +'<div class="av" style="width:36px;height:36px;font-size:12px;background:'+tc2.bg+';border-color:'+tc2.bd+';color:'+tc2.tx+';">'+ini(ss.t)+'</div>'
      +'<span style="font-size:15px;font-weight:600;">'+ss.t+'</span>'
      +'<div style="margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:5px;">'+amtLines+'</div>'
      +'</div>';
  }
  sl2.innerHTML=hasAny?h2:'<div class="empty">🎉 帳目結清！</div>';
}

// ── INIT ───────────────────────────────────────────
renderHistory();
</script>
